<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Dashboard.css" />
    <title>Document</title>
</head>
<body>
    <div class="container">
        <section class="sidebar">
            <h3><span class="billione">B</span>BILLION</h3>
            <div class="sidebarLinks">
                <div>
                    <img src="home.png" style="height: 20px;" />
                    <a href="#dashboard">Dashboard</a>
                </div>
                <div>
                    <img src="stats.png" style="height: 20px;" />
                    <a href="#monitoring">API Monitoring</a>
                </div>
                <div>
                    <a href="#pointsOfInterest">Points of Interest</a>
                </div>
                <div>
                    <a href="#configuration">Configuration</a>
                </div>
            </div>

        </section>
        <section class="main">
            <div class="header">
                <h3>BILLION | ASSET TRACKER</h3>
                <div class="profileSection">
                    <input type="text" placeholder="Search..." class="searchBar">
                    <img src="account.png" style="background-color: aliceblue; border-radius: 20px;" />
                    <p>Sugumar</p>
                </div>
            </div>
            <div class="top">
                <h3>API Monitoring Dashboard</h3>
                <div class="time-filter">
                    
                    <div class="label">
                        <p>TIME PERIOD</p>
                    </div>

                    <div class="buttons">
                        <button class="btn-1">Daily</button>
                        <button class="btn-2">Weekly</button>
                        <button class="btn-3">Monthly</button>
                    </div>
                    <p>|</p>
                    <div class="date-range">
                        <label>From</label>
                        <input type="date">

                        <label>To</label>
                        <input type="date">
                    </div>

                    <div class="refresh">
                        <button class="refresh-btn">Refresh</button>
                    </div>

                    </div>
            </div>
            <div class="grid-container">
                <div class="grid-item-1">
                    <p>TOTAL REQUESTS</p>
                    <h2>1,284,092</h2>
                </div>

                <div class="grid-item-2">
                    <p>AVG LATENCY (P50)</p>
                    <h2>42 ms</p>
                </div>

                <div class="grid-item-3">
                    <p>TAIL LATENCY (P99)</p>
                    <h2>312 ms</h2>
                </div>

                <div class="grid-item-4">
                    <p>ERROR RATE</p>
                    <h2>0.08%</h2>
                </div>
            </div>

            <div class="grid-charts">
                <div class="chart">

                </div>
                <div class="range">

                </div>
            </div>

            <div class="endpoints">
                <div class="endpoints-top">

                    <h3>WORST PERFORMING ENDPOINTS</h3>

                    <div class="search">
                        <input type="text" placeholder="Search Endpoint">
                        <button type="button">Copy</button>
                        <button type="button">Excel</button>
                    </div>
                    
                </div>
            </div>
        </section>

    </div>
</body>
</html>
