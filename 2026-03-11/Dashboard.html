<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Dashboard.css" />
    <title>Document</title>
</head>
<body>
    <div class="container">
        <section class="sidebar">
            <h3><span class="billione">B</span>BILLION</h3>
            <div class="sidebarLinks">
                <div>
                    <img src="home.png" style="height: 20px;" />
                    <a href="#dashboard">Dashboard</a>
                </div>
                <div>
                    <img src="stats.png" style="height: 20px;" />
                    <a href="#monitoring">API Monitoring</a>
                </div>
                <div>
                    <a href="#pointsOfInterest">Points of Interest</a>
                </div>
                <div>
                    <a href="#configuration">Configuration</a>
                </div>
            </div>

        </section>
        <section class="main">
            <div class="header">
                <h3>BILLION | ASSET TRACKER</h3>
                <div class="profileSection">
                    <input type="text" placeholder="Search..." class="searchBar">
                    <img src="account.png" style="background-color: aliceblue; border-radius: 20px;" />
                    <p>Sugumar</p>
                </div>
            </div>
            <div class="top">
                <h3>API Monitoring Dashboard</h3>
                <div class="time-filter">
                    
                    <div class="label">
                        <span>Time Period</span>
                    </div>

                    <div class="buttons">
                        <button>Daily</button>
                        <button>Weekly</button>
                        <button>Monthly</button>
                    </div>

                    <div class="date-range">
                        <label>From</label>
                        <input type="date">

                        <label>To</label>
                        <input type="date">
                    </div>

                    <div class="refresh">
                        <button>Refresh</button>
                    </div>

                    </div>
            </div>
        </section>

    </div>
</body>
</html>
